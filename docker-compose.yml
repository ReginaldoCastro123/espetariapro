version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: espetariapro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: espetariapro
      POSTGRES_PASSWORD: espetariapro123
      POSTGRES_DB: espetariapro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - espetariapro-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: espetariapro-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://espetariapro:espetariapro123@postgres:5432/espetariapro?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      FREE_TRIAL_DAYS: 15
      ENTERPRISE_PRICE: 39.90
    ports:
      - "3333:3333"
    depends_on:
      - postgres
    networks:
      - espetariapro-network
    command: sh -c "npx prisma migrate deploy && npm start"

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: espetariapro-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3333/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - espetariapro-network

volumes:
  postgres_data:

networks:
  espetariapro-network:
    driver: bridge
